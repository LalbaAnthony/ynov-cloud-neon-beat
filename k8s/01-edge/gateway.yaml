# Realtime Gateway (NEW stateless platform component).
# L7 proxy that pins every connection of a game to its GameServer:
#   - matches /g/<gameCode>/(ws|sse/*|public/*|admin/*)
#   - looks up game:<gameCode> in Redis -> upstream GameServer addr:port
#   - proxies WebSocket (Upgrade) and SSE (no buffering) with long timeouts
# Holds the long-lived connections -> the binding constraint is file descriptors
# / memory per pod, so it scales on the "active_connections" custom metric.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: realtime-gateway
  namespace: neon-edge
  labels: { app: realtime-gateway, app.kubernetes.io/part-of: neon-beat, tier: edge }
spec:
  replicas: 3
  selector:
    matchLabels: { app: realtime-gateway }
  template:
    metadata:
      labels: { app: realtime-gateway, tier: edge }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile: { type: RuntimeDefault }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels: { app: realtime-gateway }
      # Long drain: in-flight WS/SSE connections of live games must not be cut
      # abruptly on rollout. Clients auto-reconnect, but we still drain.
      terminationGracePeriodSeconds: 120
      containers:
        - name: gateway
          image: ghcr.io/neon-beat/realtime-gateway:1.0.0
          ports:
            - { containerPort: 8080, name: http }
            - { containerPort: 9090, name: metrics }
          env:
            - { name: REDIS_ADDR, value: "redis.neon-data.svc.cluster.local:6379" }
            - name: REDIS_PASSWORD
              valueFrom: { secretKeyRef: { name: redis-auth, key: password } }
            - { name: WS_READ_TIMEOUT_S, value: "3600" }
            - { name: SSE_BUFFERING, value: "off" }
            - { name: MAX_CONNS_PER_POD, value: "15000" }
          resources:
            requests: { cpu: "250m", memory: "256Mi" }
            limits:   { cpu: "1", memory: "1Gi" }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          lifecycle:
            preStop:
              exec: { command: ["/bin/sh", "-c", "sleep 30"] }  # stop taking new conns, let LB deregister
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: realtime-gateway
  namespace: neon-edge
  labels: { app: realtime-gateway }
spec:
  selector: { app: realtime-gateway }
  ports:
    - { port: 80, targetPort: http, name: http }
    - { port: 9090, targetPort: metrics, name: metrics }
