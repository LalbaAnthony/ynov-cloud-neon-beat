# Horizontal Pod Autoscalers for the stateless edge tier.
# The gateway scales on a CUSTOM metric (active long-lived connections), not CPU,
# because thousands of mostly-idle WS/SSE connections saturate FD/memory long
# before CPU. Requires Prometheus Adapter exposing `gateway_active_connections`.
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: realtime-gateway
  namespace: neon-edge
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: realtime-gateway }
  minReplicas: 3
  maxReplicas: 40
  metrics:
    - type: Pods
      pods:
        metric: { name: gateway_active_connections }
        target: { type: AverageValue, averageValue: "10000" }  # scale out at 10k conns/pod
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies: [{ type: Percent, value: 100, periodSeconds: 30 }]
    scaleDown:
      stabilizationWindowSeconds: 300   # slow scale-in: avoid dropping live connections
      policies: [{ type: Pods, value: 1, periodSeconds: 120 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: matchmaker
  namespace: neon-edge
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: matchmaker }
  minReplicas: 2
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-buzzer
  namespace: neon-edge
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: frontend-buzzer }
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-game
  namespace: neon-edge
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: frontend-game }
  minReplicas: 2
  maxReplicas: 15
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 70 } }
