# Aggregates all Neon Beat platform manifests for one region.
# PREREQUISITES (cluster add-ons installed first — see k8s/README.md):
#   - Agones, cert-manager, ingress-nginx, kube-prometheus-stack,
#     Prometheus Adapter, External Secrets Operator (or Sealed Secrets).
# For multi-region, layer this base with per-region Kustomize overlays
# (region name, DNS, replica floors, FleetAutoscaler min/max).
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

commonLabels:
  app.kubernetes.io/part-of: neon-beat

resources:
  # 00 — namespaces (apply first; they carry Pod Security labels)
  - 00-namespaces/namespaces.yaml

  # 03 — data + secrets (game servers depend on CouchDB/Redis being resolvable)
  - 03-data/secrets.example.yaml
  - 03-data/couchdb.yaml
  - 03-data/redis.yaml

  # 02 — game tier (Agones)
  - 02-game-tier/fleet.yaml
  - 02-game-tier/fleetautoscaler.yaml

  # 01 — edge tier
  - 01-edge/frontend-nginx-config.yaml
  - 01-edge/frontend-game.yaml
  - 01-edge/frontend-admin.yaml
  - 01-edge/frontend-buzzer.yaml
  - 01-edge/matchmaker.yaml
  - 01-edge/gateway.yaml
  - 01-edge/hpa.yaml
  - 01-edge/pdb.yaml
  - 01-edge/ingress.yaml

  # 04 — security
  - 04-security/cert-manager.yaml
  - 04-security/rbac.yaml
  - 04-security/networkpolicies.yaml
  - 04-security/quotas.yaml

  # 05 — observability
  - 05-observability/servicemonitors.yaml
  - 05-observability/prometheusrules.yaml
  - 05-observability/grafana-dashboard.yaml

# NOTE: 02-game-tier/gameserverallocation-example.yaml is intentionally NOT
# included — it is created at runtime by the matchmaker, not applied statically.
