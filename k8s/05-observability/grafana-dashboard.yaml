# Grafana dashboard provisioned via the kube-prometheus-stack sidecar (it imports
# ConfigMaps labelled grafana_dashboard="1"). Minimal "Neon Beat — Live" board:
# active games, Agones buffer, gateway connections, buzz latency p99.
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-neon-live
  namespace: neon-observability
  labels:
    grafana_dashboard: "1"
data:
  neon-live.json: |
    {
      "title": "Neon Beat — Live",
      "schemaVersion": 39,
      "time": { "from": "now-3h", "to": "now" },
      "refresh": "30s",
      "panels": [
        {
          "type": "stat", "title": "Active games (Allocated)",
          "gridPos": { "h": 6, "w": 6, "x": 0, "y": 0 },
          "targets": [{ "expr": "sum(agones_fleets_replicas_count{type=\"allocated\", name=\"neon-beat-back\"})" }]
        },
        {
          "type": "stat", "title": "Warm buffer (Ready)",
          "gridPos": { "h": 6, "w": 6, "x": 6, "y": 0 },
          "targets": [{ "expr": "sum(agones_fleets_replicas_count{type=\"ready\", name=\"neon-beat-back\"})" }]
        },
        {
          "type": "timeseries", "title": "Gateway active connections",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [{ "expr": "sum(gateway_active_connections)" }]
        },
        {
          "type": "timeseries", "title": "Buzz latency p50/p99",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            { "expr": "histogram_quantile(0.5, sum(rate(neon_buzz_latency_seconds_bucket[5m])) by (le))", "legendFormat": "p50" },
            { "expr": "histogram_quantile(0.99, sum(rate(neon_buzz_latency_seconds_bucket[5m])) by (le))", "legendFormat": "p99" }
          ]
        },
        {
          "type": "timeseries", "title": "Allocations / s",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [{ "expr": "rate(agones_allocator_allocation_requests_total{status=\"Allocated\"}[5m])" }]
        }
      ]
    }
