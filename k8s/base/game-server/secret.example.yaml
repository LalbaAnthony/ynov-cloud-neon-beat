# Exemple de Secret pour le game-server.
# NE PAS committer de vraies valeurs : en production ce Secret est genere par
# l'External Secrets Operator a partir du gestionnaire de secrets du cloud
# (GCP Secret Manager / AWS Secrets Manager / Vault). 
apiVersion: v1
kind: Secret
metadata:
  name: game-server-secrets
  namespace: neon-game
  labels:
    app.kubernetes.io/name: game-server
    app.kubernetes.io/part-of: neon-beat
type: Opaque
stringData:
  # Chaine de connexion MongoDB Atlas (cluster global, lecture/ecriture sur la
  # zone de la region courante). Remplacee par l'overlay regional.
  MONGO_URI: "mongodb+srv://USER:PASSWORD@neon-eu.xxxxx.mongodb.net/?retryWrites=true&w=majority"
  # Secret de signature des tokens admin (handshake SSE admin).
  NEON_ADMIN_TOKEN_SECRET: "change-me-32-bytes-min"
