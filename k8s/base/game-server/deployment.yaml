# Deploiement du game-server : le backend Rust (neon-beat-back) faisant tourner
# le moteur temps reel des parties (REST + WebSocket buzzers + SSE frontends).
#
# IMPORTANT : ce pod est STATEFUL en memoire (machine a etats + hubs SSE + registre
# de buzzers en RAM). Une partie est "epinglee" a un pod pour toute sa duree via
# l'affinite de session de l'Ingress (hash sur game_id). La perte d'un pod est
# tolerable car l'etat de partie est checkpointe en continu en base (cf. README backend).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-server
  namespace: neon-game
  labels:
    app.kubernetes.io/name: game-server
    app.kubernetes.io/part-of: neon-beat
    app.kubernetes.io/component: realtime
spec:
  # Le nombre de replicas est pilote par KEDA (cf. hpa-keda.yaml) ; cette valeur
  # n'est qu'un point de depart au premier deploiement.
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: game-server
  strategy:
    type: RollingUpdate
    rollingUpdate:
      # On ajoute des pods avant d'en retirer : indispensable pour ne pas couper
      # des connexions longues (WS/SSE) pendant une mise a jour.
      maxSurge: 25%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: game-server
        app.kubernetes.io/part-of: neon-beat
        app.kubernetes.io/component: realtime
    spec:
      serviceAccountName: game-server
      # Duree de drain : on laisse le temps au pod de checkpointer les parties en
      # cours et de signaler aux clients de se reconnecter (cf. preStop).
      terminationGracePeriodSeconds: 120
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      # On repartit les pods sur des zones de disponibilite distinctes pour resister
      # a la perte d'une AZ.
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: game-server
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: game-server
      containers:
        - name: game-server
          # Image construite depuis neon-beat-back avec le seul backend Mongo
          # (CARGO_FEATURES="--no-default-features --features mongo-store").
          image: ghcr.io/neon-beat/neon-beat-back:0.9.0-mongo
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: game-server-config
            - secretRef:
                name: game-server-secrets
          env:
            # Identifiant de pod propage a l'appli pour s'enregistrer dans Redis
            # (mapping game_id -> pod) et etiqueter les metriques/logs.
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            # Charge dominee par les connexions longues (memoire) plus que par le CPU.
            # Dimensionnement : ~50 parties / 2000 connexions par pod (cf. capacity-planning).
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "1Gi"
          # Sonde de demarrage : laisse le temps a la connexion DB de s'etablir
          # avant d'activer les sondes liveness/readiness.
          startupProbe:
            httpGet:
              path: /healthcheck
              port: http
            failureThreshold: 30
            periodSeconds: 2
          # Readiness : retire le pod du load balancing s'il ne peut plus servir
          # (ex : mode degrade base de donnees prolonge).
          readinessProbe:
            httpGet:
              path: /healthcheck
              port: http
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          # Liveness : redemarre le pod uniquement s'il est reellement bloque.
          livenessProbe:
            httpGet:
              path: /healthcheck
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          lifecycle:
            preStop:
              exec:
                # Drain controle : on bascule le pod en mode "draining" (refus des
                # nouvelles parties), on checkpoint les parties actives et on emet
                # un evenement SSE invitant les clients a se reconnecter (ils seront
                # re-route vers un autre pod qui rechargera la partie depuis la DB).
                command:
                  - /bin/sh
                  - -c
                  - "curl -fsS -X POST http://127.0.0.1:8080/internal/drain || true; sleep 15"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            # Systeme de fichiers racine en lecture seule : on fournit un /tmp inscriptible.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
