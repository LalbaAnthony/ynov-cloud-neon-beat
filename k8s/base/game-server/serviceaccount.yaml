# Compte de service dedie au game-server (principe du moindre privilege).
# Aucune permission d'API Kubernetes n'est accordee : le pod n'a pas besoin de
# parler a l'API server. L'eventuel acces aux secrets cloud passe par l'identite
# federee (Workload Identity / IRSA) annotee ci-dessous selon le fournisseur.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: game-server
  namespace: neon-game
  labels:
    app.kubernetes.io/name: game-server
    app.kubernetes.io/part-of: neon-beat
  # annotations:
  #   # GKE Workload Identity :
  #   iam.gke.io/gcp-service-account: neon-game-server@PROJECT.iam.gserviceaccount.com
  #   # EKS IRSA :
  #   eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/neon-game-server
automountServiceAccountToken: false
