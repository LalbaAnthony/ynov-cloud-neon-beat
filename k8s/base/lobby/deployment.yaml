# Lobby (plan de controle global du multi-region).
#
# Role : c'est le SEUL composant nouveau a developper en plus du backend existant.
# Responsabilites (service HTTP stateless, sans etat de jeu) :
#   - a la creation d'une partie : choisir la region "domicile" (la plus proche de
#     l'hote/Game Master) et enregistrer game_id -> region dans le registre global ;
#   - a la jonction d'un joueur : resoudre la region d'une partie (game_id -> URL
#     regionale) pour que le client se connecte directement au bon cluster ;
#   - exposer un annuaire des regions et leur sante (capacite, latence).
#
# Comme il est sans etat, il scale horizontalement de facon triviale (HPA CPU/RPS)
# et peut etre deploye dans chaque region derriere le DNS geographique.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lobby
  namespace: neon-game
  labels:
    app.kubernetes.io/name: lobby
    app.kubernetes.io/part-of: neon-beat
    app.kubernetes.io/component: control-plane
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: lobby
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 50%
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lobby
        app.kubernetes.io/part-of: neon-beat
        app.kubernetes.io/component: control-plane
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: lobby
          # Image a construire par l'equipe (memes pipelines que le backend).
          image: ghcr.io/neon-beat/neon-beat-lobby:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8090
          env:
            # Registre global des parties (game_id -> region). On reutilise le cluster
            # MongoDB global (collection "game_directory") pour rester coherent.
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: game-server-secrets
                  key: MONGO_URI
            - name: GAME_DIRECTORY_DB
              value: "neon_control"
            # Liste des endpoints regionaux exposes aux clients (resolus par le DNS geo).
            - name: REGION_ENDPOINTS
              value: "eu-west=https://eu.neon-beat.app,us-east=https://us.neon-beat.app,ap-southeast=https://ap.neon-beat.app"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
