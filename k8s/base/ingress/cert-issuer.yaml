# Emetteur de certificats TLS via cert-manager + Let's Encrypt (challenge HTTP-01).
# Fournit le chiffrement de bout en bout entre les clients et l'Ingress.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@neon-beat.app
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
