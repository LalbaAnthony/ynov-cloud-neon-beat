# cert-manager ClusterIssuer (Let's Encrypt). Requires cert-manager installed.
# Ingress resources reference it via cert-manager.io/cluster-issuer: letsencrypt-prod;
# certificates are then issued/renewed automatically into the *-tls secrets.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ops@neonbeat.io
    privateKeySecretRef:
      name: letsencrypt-prod-account-key
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
# Explicit wildcard Certificate for the realtime host family (DNS-01 would be
# required for a true wildcard; shown here as the per-host certs are handled by
# the Ingress annotations above — kept for documentation of the TLS strategy).
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: neon-live-tls
  namespace: neon-edge
spec:
  secretName: neon-live-tls
  issuerRef:
    name: letsencrypt-prod
    kind: ClusterIssuer
  dnsNames:
    - live.neonbeat.io
