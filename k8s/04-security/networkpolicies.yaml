# Micro-segmentation: default deny-all per namespace, then explicit allows.
# Uses the auto-applied `kubernetes.io/metadata.name` namespace label.
# NOTE: Agones requires the game pods to reach kube-dns and the Agones system;
# those allowances are included below.
---
############################ neon-edge ############################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: neon-edge }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-dns, namespace: neon-edge }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-ingress-controller, namespace: neon-edge }
spec:
  # Ingress controller (ingress-nginx ns) may reach edge HTTP services.
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: ingress-nginx } }
      ports:
        - { protocol: TCP, port: 8080 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: edge-egress-to-game-and-data, namespace: neon-edge }
spec:
  # matchmaker -> Agones allocator (neon-game/agones-system); gateway -> GameServers;
  # both -> Redis (neon-data).
  podSelector:
    matchExpressions:
      - { key: app, operator: In, values: [matchmaker, realtime-gateway] }
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: neon-game } }
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: agones-system } }
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: neon-data } }
          podSelector: { matchLabels: { app: redis } }
      ports:
        - { protocol: TCP, port: 6379 }
---
############################ neon-game ############################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: neon-game }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-dns, namespace: neon-game }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: gameservers-ingress-from-gateway, namespace: neon-game }
spec:
  podSelector: { matchLabels: { app: neon-beat-back } }
  policyTypes: [Ingress]
  ingress:
    # Realtime traffic only from the gateway; allocation only from matchmaker.
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: neon-edge } }
      ports:
        - { protocol: TCP, port: 8080 }
    # Agones controller/SDK system traffic (health, allocation).
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: agones-system } }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: gameservers-egress, namespace: neon-game }
spec:
  podSelector: { matchLabels: { app: neon-beat-back } }
  policyTypes: [Egress]
  egress:
    # Persistence -> CouchDB.
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: neon-data } }
          podSelector: { matchLabels: { app: couchdb } }
      ports:
        - { protocol: TCP, port: 5984 }
    # Agones SDK sidecar -> agones-system.
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: agones-system } }
---
############################ neon-data ############################
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: default-deny, namespace: neon-data }
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: allow-dns, namespace: neon-data }
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: kube-system } }
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: couchdb-access, namespace: neon-data }
spec:
  podSelector: { matchLabels: { app: couchdb } }
  policyTypes: [Ingress, Egress]
  ingress:
    # From game servers (persistence) + peer nodes (clustering) + Prometheus.
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: neon-game } }
      ports: [{ protocol: TCP, port: 5984 }]
    - from:
        - podSelector: { matchLabels: { app: couchdb } }
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: neon-observability } }
      ports: [{ protocol: TCP, port: 5984 }]
  egress:
    - to:
        - podSelector: { matchLabels: { app: couchdb } }   # intra-cluster Erlang
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata: { name: redis-access, namespace: neon-data }
spec:
  podSelector: { matchLabels: { app: redis } }
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: neon-edge } }
      ports: [{ protocol: TCP, port: 6379 }]
    - from:
        - namespaceSelector: { matchLabels: { kubernetes.io/metadata.name: neon-observability } }
      ports: [{ protocol: TCP, port: 9121 }]
