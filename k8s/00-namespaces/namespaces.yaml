# Namespaces for the Neon Beat global platform.
# Pod Security Standards are enforced at namespace level (restricted profile)
# so every workload runs non-root, with a read-only rootfs and no extra caps.
apiVersion: v1
kind: Namespace
metadata:
  name: neon-edge
  labels:
    app.kubernetes.io/part-of: neon-beat
    tier: edge
    # Pod Security Standards: block anything not matching the restricted profile.
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: neon-game
  labels:
    app.kubernetes.io/part-of: neon-beat
    tier: game
    # Game servers are managed by Agones; "baseline" leaves room for the
    # Agones sidecar/hostPort networking while still forbidding privileged pods.
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: neon-data
  labels:
    app.kubernetes.io/part-of: neon-beat
    tier: data
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/warn: restricted
---
apiVersion: v1
kind: Namespace
metadata:
  name: neon-observability
  labels:
    app.kubernetes.io/part-of: neon-beat
    tier: observability
    pod-security.kubernetes.io/enforce: restricted
    pod-security.kubernetes.io/enforce-version: latest
