# EXAMPLE secrets — DO NOT commit real values. In production these are produced
# by the External Secrets Operator (pulling from a cloud vault) or Sealed Secrets.
#
# IMPORTANT: Secrets are namespace-scoped. The same credentials must be made
# available in EVERY namespace that consumes them:
#   couchdb-auth -> neon-data (CouchDB itself) AND neon-game (the Fleet)
#   redis-auth   -> neon-data (Redis itself)   AND neon-edge  (matchmaker, gateway)
# With ESO you declare one ExternalSecret per namespace referencing the same key.
---
apiVersion: v1
kind: Secret
metadata:
  name: couchdb-auth
  namespace: neon-data
type: Opaque
stringData:
  username: "neonbeat"
  password: "CHANGE_ME_couch"
  cookie: "CHANGE_ME_erlang_cookie"   # shared Erlang cookie for clustering
---
apiVersion: v1
kind: Secret
metadata:
  name: couchdb-auth
  namespace: neon-game
type: Opaque
stringData:
  username: "neonbeat"
  password: "CHANGE_ME_couch"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-auth
  namespace: neon-data
type: Opaque
stringData:
  password: "CHANGE_ME_redis"
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-auth
  namespace: neon-edge
type: Opaque
stringData:
  password: "CHANGE_ME_redis"
