# EXAMPLE GameServerAllocation — for documentation/testing only.
# In production the MATCHMAKER creates this object (or calls the Agones Allocator
# gRPC service) when a game master clicks "create game". Agones moves one Ready
# GameServer to Allocated and returns its address:port, which the matchmaker
# stores in Redis as game:<gameCode> for the gateway to route to.
apiVersion: allocation.agones.dev/v1
kind: GameServerAllocation
metadata:
  namespace: neon-game
  generateName: alloc-
spec:
  # Prefer a Ready server from our fleet in this region.
  selectors:
    - matchLabels:
        agones.dev/fleet: neon-beat-back
      gameServerState: Ready
  # Stamp the allocated server with game metadata for routing/observability.
  metadata:
    labels:
      neon-beat.io/region: eu-west-1
    annotations:
      neon-beat.io/game-code: "DEMO-1234"
